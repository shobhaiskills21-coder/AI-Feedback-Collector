<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSPC Feedback Collector</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; text-align: center; }
        label { display: block; margin: 15px 0 5px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background-color: #28a745; color: white; padding: 10px; border: none; border-radius: 4px; margin-top: 20px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>SSPC Feedback Collector</h2>
    <form id="feedbackForm">
        <label for="name">आपका नाम:</label>
        <input type="text" id="name" required>
        
        <label for="email">ईमेल:</label>
        <input type="email" id="email" required>
        
        <label for="feedback">आपका फीडबैक:</label>
        <textarea id="feedback" rows="5" required></textarea>
        
        <button type="submit">सबमिट करें</button>
    </form>
</div>

<script>
    document.getElementById('feedbackForm').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('धन्यवाद! SSPC Feedback Collector में आपका फीडबैक सफलतापूर्वक सबमिट हो गया है।');
    });
</script>

</body>
</html>
